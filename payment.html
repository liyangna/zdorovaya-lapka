<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата услуг | Здоровая Лапка</title>
    <script src="https://yookassa.ru/checkout-widget/v1/checkout-widget.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

    <div class="container mx-auto px-4 py-12 max-w-2xl">
        <div class="text-center mb-8">
            <i class="fas fa-paw text-4xl text-blue-600 mb-3"></i>
            <h1 class="text-3xl font-bold text-gray-800">Здоровая Лапка</h1>
            <p class="text-gray-500 mt-2">Оплата ветеринарных услуг онлайн</p>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Информация о платеже</h2>
            <div class="border-b pb-3 mb-3">
                <div class="flex justify-between">
                    <span class="text-gray-500">Заказ №:</span>
                    <span class="font-medium" id="orderNumber">Загрузка...</span>
                </div>
            </div>
            <div class="border-b pb-3 mb-3">
                <div class="flex justify-between">
                    <span class="text-gray-500">Услуга:</span>
                    <span class="font-medium" id="serviceName">-</span>
                </div>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-500">Сумма:</span>
                <span class="text-2xl font-bold text-blue-600" id="amount">0 ₽</span>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Данные для оплаты</h2>
            <div id="payment-form"></div>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="text-blue-500 hover:text-blue-700">
                <i class="fas fa-arrow-left"></i> Вернуться на главную
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || '100';
        const service = urlParams.get('service') || 'Консультация';

        document.getElementById('orderNumber').innerText = 'ORD-' + Date.now();
        document.getElementById('serviceName').innerText = decodeURIComponent(service);
        document.getElementById('amount').innerText = amount + ' ₽';

        async function initPayment() {
            try {
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount, description: service })
                });
                const data = await response.json();
                
                const checkout = new window.YooMoneyCheckoutWidget({
                    confirmation_token: data.confirmation_token,
                    return_url: window.location.origin + '/success.html',
                    error_callback: function(error) {
                        console.error('Ошибка:', error);
                        alert('Произошла ошибка при загрузке формы оплаты.');
                    }
                });
                checkout.render('payment-form');
            } catch (error) {
                document.getElementById('payment-form').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                        Не удалось загрузить форму оплаты. Убедитесь, что сервер запущен.
                    </div>
                `;
            }
        }
        initPayment();
    </script>
</body>
</html>
